<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header class="header">
            <h1 class="header__title">Sistema de Validación</h1>
            <p class="header__subtitle">Consulta usuarios en la base de datos y registra tareas</p>
        </header>

        <section class="form-section">
            <div class="card">
                <h2 class="card__title">Validar Usuario</h2>
                
                <form id="messageForm" class="form" novalidate>
                    <div class="form__group">
                        <label for="userName" class="form__label">
                            ID del Usuario
                        </label>
                        <input 
                            type="number" 
                            id="userName" 
                            class="form__input" 
                            placeholder="Ej: 1, 2, 3..."
                            aria-required="true"
                        >
                        <span class="form__error" id="userNameError" style="display: block; margin-top: 5px; font-weight: bold;"></span>
                    </div>

                    <div class="form__group">
                        <label for="userMessage" class="form__label">
                            Descripción de la Tarea
                        </label>
                        <textarea 
                            id="userMessage" 
                            class="form__input form__textarea" 
                            placeholder="Escribe la tarea para este usuario..."
                            rows="4"
                            aria-required="true"
                        ></textarea>
                        <span class="form__error" id="userMessageError"></span>
                    </div>

                    <button type="submit" class="btn btn--primary" id="submitBtn">
                        <span class="btn__text">Validar y Registrar</span>
                        <span class="btn__icon">➤</span>
                    </button>
                </form>
            </div>
        </section>

        <section class="messages-section">
            <div class="messages-header">
                <h2 class="messages-header__title">Tareas Asignadas</h2>
                <span class="messages-header__count" id="messageCount">0 tareas</span>
            </div>
            
            <div id="messagesContainer" class="messages-container">
                <div class="messages-empty" id="emptyState">
                    <p class="messages-empty__text">No hay tareas registradas</p>
                    <p class="messages-empty__subtext">Ingresa un ID válido para comenzar</p>
                </div>
            </div>
        </section>

        <footer class="footer">
            <p class="footer__text">DOM</p>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
